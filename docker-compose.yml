# Local dependencies for one-command setup: `docker compose up -d`.
# A drop-in reviewer is running in minutes, on any machine.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gamma
      POSTGRES_PASSWORD: gamma
      POSTGRES_DB: gamma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamma"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # S3-compatible object storage for media (long video/audio never touch the app
  # server — clients upload/download via presigned URLs). Console at :9001.
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gamma
      MINIO_ROOT_PASSWORD: gammasecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
