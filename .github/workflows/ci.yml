name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Compile-time sqlx query checks use the committed .sqlx cache, not a live DB.
  SQLX_OFFLINE: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # The Rust workspace lives in backend/ (monorepo: backend/ + frontend/).
    defaults:
      run:
        working-directory: backend

    # Backing services for the integration tests. #[sqlx::test] creates and drops
    # isolated temporary databases on Postgres; Redis backs the transcode/ingestion
    # queues; MinIO (started as a step below — service containers can't override the
    # image command MinIO needs) backs the media object store.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gamma
          POSTGRES_PASSWORD: gamma
          POSTGRES_DB: gamma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gamma"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://gamma:gamma@localhost:5432/gamma
      REDIS_URL: redis://localhost:6379
      # S3_* default (StorageConfig::from_env) to gamma/gammasecret @ localhost:9000,
      # bucket gamma-media — matching the MinIO container below, so no overrides needed.

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: System deps (ffmpeg — the transcode tests shell out to it)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start MinIO (S3-compatible object store for the media tests)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=gamma -e MINIO_ROOT_PASSWORD=gammasecret \
            minio/minio server /data
          echo "waiting for MinIO…"
          for _ in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint (clippy, warnings = errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (unit + settlement invariants + DB/Redis/MinIO integration)
        run: cargo test --all
