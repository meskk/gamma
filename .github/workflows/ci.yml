name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Compile-time sqlx query checks use the committed .sqlx cache, not a live DB.
  SQLX_OFFLINE: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # The Rust workspace lives in backend/ (monorepo: backend/ + frontend/).
    defaults:
      run:
        working-directory: backend

    # Backing services for the integration tests. #[sqlx::test] creates and drops
    # isolated temporary databases on Postgres; Redis backs the transcode/ingestion
    # queues; MinIO (started as a step below — service containers can't override the
    # image command MinIO needs) backs the media object store.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gamma
          POSTGRES_PASSWORD: gamma
          POSTGRES_DB: gamma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gamma"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://gamma:gamma@localhost:5432/gamma
      REDIS_URL: redis://localhost:6379
      # S3_* default (StorageConfig::from_env) to gamma/gammasecret @ localhost:9000,
      # bucket gamma-media — matching the MinIO container below, so no overrides needed.

    steps:
      # Actions pinned to full commit SHAs — a tag is mutable, a SHA is not. The
      # trailing comment records the human-readable version each SHA was resolved
      # from; bump both together.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # SHA of the `stable` ref; the toolchain is now selected via `with:` because
      # a SHA ref no longer encodes it (rust-toolchain.toml still pins the version
      # cargo actually uses).
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, 2026 snapshot
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: backend

      - name: System deps (ffmpeg — the transcode tests shell out to it)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start MinIO (S3-compatible object store for the media tests)
        run: |
          # Pinned to the content digest (tag RELEASE.2025-04-22T22-12-26Z at pin
          # time) — a digest is immutable, a tag is not.
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=gamma -e MINIO_ROOT_PASSWORD=gammasecret \
            minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e server /data
          echo "waiting for MinIO…"
          ready=""
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ -z "$ready" ]; then
            echo "MinIO did not become healthy in time" >&2
            docker logs minio || true
            exit 1
          fi

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint (clippy, warnings = errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (unit + settlement invariants + DB/Redis/MinIO integration)
        run: cargo test --all

      # `cargo test` regenerates the ts-rs frontend contract (the export_bindings
      # tests). If the committed bindings drifted from the Rust types, fail — the
      # contract must be regenerated and committed alongside the API change.
      # `git add -A` then a cached diff so NEW (untracked) exports and DELETED
      # bindings are caught too — a plain `git diff` sees only tracked, modified files.
      - name: Frontend contract is in sync (bindings not drifted)
        run: |
          git add -A bindings
          git diff --cached --exit-code bindings

  # The Python AI-ingestion service (services/ingestion). Its tests are pure —
  # httpx MockTransport + fakes, no Redis/Postgres — so this job needs no backing
  # services and runs independently of the Rust workspace above.
  ingestion-python:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/ingestion

    steps:
      # SHA-pinned; see the note in build-and-test.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      # Install the EXACT pinned + hashed versions from the committed lock, so CI
      # (and the eventual Mac Studio install) are reproducible. --no-deps installs
      # the local package itself without re-resolving its dependencies.
      - name: Install (pinned deps from the committed lock)
        run: |
          pip install -r requirements.lock
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest -q

  # The ingestion service's deploy unit is its Dockerfile — build it in CI so a
  # broken image (bad lock, missing file, changed base) is caught here, not at deploy.
  ingestion-docker:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/ingestion

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build the ingestion image (the declared deploy unit)
        run: docker build -t gamma-ingestion:ci .

  # The backend's deploy unit (M4.2): one image, three binaries (core-api,
  # transcode_worker, settlement_scheduler — the command picks). Built here so
  # a broken Dockerfile / missing .sqlx entry / toolchain drift is caught
  # before deploy. Release build — the slowest job, deliberately independent
  # of build-and-test so neither delays the other.
  backend-docker:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build the backend image (the declared deploy unit)
        run: docker build -t gamma-backend:ci .
      - name: Image smoke — every binary answers --help or starts
        run: |
          # The binaries exit non-zero without env/services; asserting the
          # entrypoints EXIST and are runnable catches copy/strip mistakes.
          for bin in core-api transcode_worker settlement_scheduler; do
            docker run --rm --entrypoint /bin/bash gamma-backend:ci -c "command -v $bin"
          done

  # The Next.js frontend (frontend/). Typechecks against the committed ts-rs
  # contract (backend/bindings/*.ts via the @contract alias), so a backend API
  # shape change that wasn't reflected in the frontend breaks CI here, and builds.
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # SHA-pinned; see the note in build-and-test.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check (contract alignment)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
