name: Publish

# Publishes the two deploy units (backend, ingestion) to GHCR, tagged with the
# git SHA of the dispatched commit (MASTERPLAN M4.6). Manual by design
# (workflow_dispatch): images are published deliberately, and the deploy
# itself stays a human action on the VM — set GAMMA_IMAGE_TAG in .env.prod to
# the SHA this run prints, then `compose pull && up -d` (OPERATIONS.md §6).
# A SHA tag is pushed exactly once — ENFORCED, not convention: the push step
# skips (and never overwrites) a tag that already exists, so a re-run only
# completes whatever half of a partially failed run is still missing and the
# rollback identity "previous SHA == previous digest" holds. The run summary
# records the registry's own digest either way. Deploy with the SHA of a
# fully GREEN run only (both images must exist for one GAMMA_IMAGE_TAG).
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to ghcr.io with the workflow's own GITHUB_TOKEN

# Two dispatches of the same commit must not race check-then-push.
concurrency:
  group: publish-${{ github.sha }}

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
    steps:
      # Actions pinned to full commit SHAs — same policy as ci.yml.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build (one image, three binaries)
        run: docker build -t "$IMAGE" backend

      - name: Smoke — every binary exists and is runnable
        run: |
          for bin in core-api transcode_worker settlement_scheduler; do
            docker run --rm --entrypoint /bin/bash "$IMAGE" -c "command -v $bin"
          done

      - name: Push (a published tag never moves — skip if it already exists)
        run: |
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "tag already published — leaving it untouched (re-run completes, never overwrites)"
          else
            docker push "$IMAGE"
          fi

      - name: Record tag + digest in the run summary (registry truth, push or skip)
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE" --format '{{println .Manifest.Digest}}' | head -1)
          echo "backend: \`${{ github.sha }}\` → \`$digest\`" >> "$GITHUB_STEP_SUMMARY"

  ingestion:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}-ingestion:${{ github.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build
        run: docker build -t "$IMAGE" services/ingestion

      - name: Smoke — the package imports inside the image
        run: docker run --rm --entrypoint python "$IMAGE" -c "import gamma_ingestion"

      - name: Push (a published tag never moves — skip if it already exists)
        run: |
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "tag already published — leaving it untouched (re-run completes, never overwrites)"
          else
            docker push "$IMAGE"
          fi

      - name: Record tag + digest in the run summary (registry truth, push or skip)
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE" --format '{{println .Manifest.Digest}}' | head -1)
          echo "ingestion: \`${{ github.sha }}\` → \`$digest\`" >> "$GITHUB_STEP_SUMMARY"
